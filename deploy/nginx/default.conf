# Proxy to MalfunctionDZ FastAPI (platform_py) on the shared Docker network.
# Mount as /etc/nginx/conf.d/default.conf (see repo root docker-compose.yml).

client_max_body_size 4M;

upstream platform_py {
    server platform_py:8000;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://platform_py;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }
}
