# ASC public website — separate origin from MalfunctionDZ (:8000).
# Browser URL: http://localhost:8006/   → upstream /dz/{slug}/…
#
# Sends X-Asc-Public-Site: 1 so the API emits root-relative links (/about, /prices).
# Change $asc_slug if your dropzone slug differs.

upstream platform_py {
    server platform_py:8000;
}

server {
    listen 80;
    server_name localhost;

    set $asc_slug alaska-skydive-center;

    client_max_body_size 8M;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_buffering off;

    # Optional files shipped in this repo (see docker-compose volume site-assets)
    location ^~ /site-assets/ {
        alias /usr/share/nginx/site-assets/;
        add_header Cache-Control "public, max-age=3600";
    }

    location ^~ /static/ {
        proxy_pass http://platform_py;
    }

    location ^~ /uploads/ {
        proxy_pass http://platform_py;
    }

    location ^~ /api/ {
        proxy_pass http://platform_py;
    }

    location = / {
        proxy_set_header X-Asc-Public-Site 1;
        proxy_pass http://platform_py/dz/$asc_slug;
    }

    location / {
        proxy_set_header X-Asc-Public-Site 1;
        proxy_pass http://platform_py/dz/$asc_slug$request_uri;
    }
}
