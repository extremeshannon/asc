# Alaska Skydive Center — static site only. No proxy, no other apps.
# Document root: /usr/share/nginx/html  →  repo ./site
# Optional images: ./public  →  /site-assets/

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    ssi on;

    location ^~ /site-assets/ {
        alias /usr/share/nginx/site-assets/;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
