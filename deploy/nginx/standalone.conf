# Alaska Skydive Center — static site only. No proxy, no other apps.
# Document root: /usr/share/nginx/html  →  repo ./site
# Images: compose mounts ./public → /usr/share/nginx/site-assets
#         Use `root` (not `alias`) so /site-assets/foo.jpg → /usr/share/nginx/site-assets/foo.jpg

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    ssi on;

    location ^~ /site-assets/ {
        root /usr/share/nginx;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
