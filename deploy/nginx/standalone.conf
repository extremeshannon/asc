# Alaska Skydive Center — static site + kiosk AWC proxy (same-origin for Pi browser CORS).
# Document root: /usr/share/nginx/html  →  repo ./site
# Images: compose mounts ./public → /usr/share/nginx/site-assets
#         Use `root` (not `alias`) so /site-assets/foo.jpg → /usr/share/nginx/site-assets/foo.jpg
#
# /kiosk-awc/* → https://aviationweather.gov/api/data/* (METAR, winds aloft text, etc.)

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    ssi on;

    # Prefix + rewrite: variable proxy_pass in regex locations is fragile (502s); this preserves ?query.
    location ^~ /kiosk-awc/ {
        rewrite ^/kiosk-awc/(.*)$ /api/data/$1 break;
        proxy_pass https://aviationweather.gov;
        proxy_ssl_server_name on;
        proxy_set_header Host aviationweather.gov;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-store";
    }

    location ^~ /site-assets/ {
        root /usr/share/nginx;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
