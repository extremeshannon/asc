<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alaska Skydive Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body class="ps-body">
<!--# include virtual="/nav.html" -->

  <section class="ps-hero-full" aria-label="Hero">
    <img class="ps-hero-full__photo" src="/site-assets/hero-main.jpg" alt="" width="1920" height="1080" fetchpriority="high" decoding="async" onload="this.closest('.ps-hero-full').classList.add('ps-hero-full--has-photo')" onerror="this.remove()">
    <div class="ps-hero-full__bg" aria-hidden="true"></div>
    <div class="ps-hero-full__peak" role="note" aria-label="Pioneer Peak elevation">
      <span class="ps-hero-full__peak-line" aria-hidden="true"></span>
      <span class="ps-hero-full__peak-tag">PIONEER PEAK • 6,398′</span>
    </div>
    <div class="ps-hero-full__inner">
      <p class="ps-hero-full__eyebrow">PALMER MUNICIPAL AIRPORT • PALMER, ALASKA</p>
      <h1 class="ps-hero-full__title ps-hero-full__title--stacked">
        <span class="ps-hero-full__title-line">ALASKA</span>
        <span class="ps-hero-full__title-line ps-hero-full__title-line--accent">SKYDIVE</span>
        <span class="ps-hero-full__title-line">CENTER</span>
      </h1>
      <p class="ps-hero-full__sub">JUMP ABOVE THE CHUGACH • EXPERIENCE ALASKA FROM THE TOP</p>
      <a class="ps-hero-full__cta" href="/booking">BOOK YOUR JUMP</a>
    </div>
  </section>

  <section class="ps-tiles" aria-label="Experiences">
    <div class="ps-tiles__inner">
      <a class="ps-tile ps-tile--tandem" href="/freefall">
        <img class="ps-tile__photo" src="/site-assets/gallery-01-tandem.jpg" alt="" width="800" height="1000" loading="lazy" decoding="async" onload="this.closest('.ps-tile').classList.add('ps-tile--has-photo')" onerror="this.remove()">
        <span class="ps-tile__fill" aria-hidden="true"></span>
        <span class="ps-tile__cap">FREEFALL</span>
      </a>
      <a class="ps-tile ps-tile--door" href="/tandem-exit">
        <img class="ps-tile__photo" src="/site-assets/gallery-04-climbout.jpg" alt="" width="800" height="1000" loading="lazy" decoding="async" onload="this.closest('.ps-tile').classList.add('ps-tile--has-photo')" onerror="this.remove()">
        <span class="ps-tile__fill" aria-hidden="true"></span>
        <span class="ps-tile__cap">DOOR EXIT</span>
      </a>
      <a class="ps-tile ps-tile--canopy" href="/canopy-ride">
        <img class="ps-tile__photo" src="/site-assets/gallery-02-landing.jpg" alt="" width="800" height="1000" loading="lazy" decoding="async" onload="this.closest('.ps-tile').classList.add('ps-tile--has-photo')" onerror="this.remove()">
        <span class="ps-tile__fill" aria-hidden="true"></span>
        <span class="ps-tile__cap">CANOPY RIDE</span>
      </a>
      <a class="ps-tile ps-tile--learn" href="/asp">
        <img class="ps-tile__photo" src="/site-assets/gallery-03-solo.jpg" alt="" width="800" height="1000" loading="lazy" decoding="async" onload="this.closest('.ps-tile').classList.add('ps-tile--has-photo')" onerror="this.remove()">
        <span class="ps-tile__fill" aria-hidden="true"></span>
        <span class="ps-tile__cap">LEARN TO SKYDIVE</span>
      </a>
    </div>
  </section>

<!--# include virtual="/footer.html" -->
</body>
</html>
