# Alaska Skydive Center — website only (HTML/CSS in ./site).
# Nothing else required: no platform-py, no shared Docker network.
#
#   docker compose up -d
#   → http://localhost:8006/

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: asc_alaska_site
    restart: unless-stopped
    ports:
      - "8006:80"
    volumes:
      - ./deploy/nginx/standalone.conf:/etc/nginx/conf.d/default.conf:ro
      - ./site:/usr/share/nginx/html:ro
      - ./public:/usr/share/nginx/site-assets:ro
