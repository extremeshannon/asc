# Alaska Skydive Center — standalone public website (Nginx on host port 8006).
#
# Prerequisite: MalfunctionDZ API `platform_py` is running and attached to
# Docker network `platform_platform` (from platform-py docker compose).
#
#   cd ../platform/platform-py && docker compose up -d
#   cd ../ASC && docker compose up -d
#
# Site: http://localhost:8006/
# MalfunctionDZ app (admin, manifest, etc.): http://localhost:8000/

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: asc_public_site
    restart: unless-stopped
    ports:
      - "8006:80"
    volumes:
      - ./deploy/nginx/asc-public-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/site-assets:ro
    networks:
      - platform_platform

networks:
  platform_platform:
    name: platform_platform
    external: true
